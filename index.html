<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>С Днем Рождения!</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff9f;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .text {
      font-size: 30px;
      text-align: center;
      animation: glow 1s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #00ff9f; }
      to { text-shadow: 0 0 30px #00ff9f; }
    }
  </style>
</head>
<body>

<div class="text">
  С ДНЕМ РОЖДЕНИЯ 💻<br>
  Ты — настоящий программист!<br>
  Пусть код компилируется с первого раза 🚀
</div>

</body>
</html>
